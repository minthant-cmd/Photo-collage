<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photo Editor Pro Ultimate</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    touch-action:none;
    user-select:none;
}

body{
    background:#000;
    color:#fff;
    font-family:-apple-system,sans-serif;
    overflow:hidden;
    width:100vw;
    height:100vh;
}

.main-container{
    display:flex;
    flex-direction:column;
    width:100%;
    height:100%;
}

.header{
    background:#181818;
    padding:10px 5px;
    display:flex;
    flex-direction:column;
    gap:8px;
    border-bottom:1px solid #333;
    z-index:10;
}

.row{
    display:flex;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
}

button{
    padding:12px 14px;
    border:none;
    border-radius:8px;
    background:#333;
    color:#fff;
    font-size:11px;
    font-weight:bold;
}

.btn-blue{background:#007bff!important;}
.btn-green{background:#28a745!important;}
.btn-red{background:#d9534f!important;}
.btn-success{background:#5cb85c!important;}
.btn-yellow{background:#ff9500!important;}

.color-bar{
    display:flex;
    justify-content:center;
    gap:12px;
    padding:8px;
    background:#222;
    border-radius:30px;
    margin:5px 15px;
    border:1px solid #333;
}

.c-btn{
    width:28px;
    height:28px;
    border-radius:50%;
    border:2px solid #555;
}

.editor-view{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#080808;
    position:relative;
    overflow:hidden;
}

#collage-grid{
    width:95vw;
    height:95vw;
    max-width:450px;
    max-height:450px;
    background:#fff;
    display:grid;
    gap:4px;
    border:4px solid #fff;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.grid-1{grid-template-columns:1fr;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{
    grid-template-areas:
    "t t"
    "bl br";
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
}
.grid-4{
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
}

.slot{
    background:#222;
    position:relative;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.slot img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    max-width:none;
    pointer-events:none;
    image-rendering:-webkit-optimize-contrast;
}

.floating-text{
    position:absolute;
    z-index:100;
    left:0;
    top:0;
    padding:10px;
    font-size:35px;
    font-weight:900;
    white-space:nowrap;
    color:#fff;
    text-shadow:2px 2px 10px #000;
    cursor:move;
    will-change:transform;
}

.floating-text.active{
    border:2px dashed #007bff;
    background:rgba(0,123,255,0.1);
}

.size-control{
    width:100%;
    max-width:380px;
    height:70px;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin-top:10px;
}

.size-control input{
    width:80%;
    accent-color:#007bff;
}

#trash-can{
    position:absolute;
    right:25px;
    bottom:25px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:rgba(217,83,79,0.2);
    border:2px solid #d9534f;
    color:#d9534f;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    transition:all .2s ease;
}

#trash-can.hover{
    background:#d9534f;
    color:#fff;
    transform:scale(1.2);
}

#textModal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.9);
    z-index:2000;
}

.modal-box{
    background:#222;
    width:85%;
    max-width:320px;
    border-radius:15px;
    padding:30px;
}

.modal-box input{
    width:100%;
    padding:15px;
    border-radius:8px;
    border:1px solid #555;
    background:#000;
    color:#fff;
    font-size:18px;
    outline:none;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="main-container">

<div id="trash-can">
<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<polyline points="3 6 5 6 21 6"></polyline>
<path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
<line x1="10" y1="11" x2="10" y2="17"></line>
<line x1="14" y1="11" x2="14" y2="17"></line>
</svg>
</div>

<div class="header">

<div class="row">
<button class="btn-blue" onclick="showModal()">ADD TEXT</button>
<button class="btn-green" onclick="saveImage()">DOWNLOAD HD</button>
<button class="btn-yellow" onclick="undoAction()">UNDO</button>
<button class="btn-yellow" onclick="redoAction()">REDO</button>
<button onclick="location.reload()">CLEAR</button>
</div>

<div class="row">
<button class="btn-blue" onclick="toggleOrientation()">HORIZONTAL / VERTICAL</button>
</div>

<div class="row">
<button onclick="updateLayout('grid-1')">1P</button>
<button onclick="updateLayout('grid-2')">2P</button>
<button onclick="updateLayout('grid-3')">3P</button>
<button onclick="updateLayout('grid-4')">4P</button>
<button class="btn-red" onclick="addFloatingText('BEFORE','#ff3b30')">BEFORE</button>
<button class="btn-success" onclick="addFloatingText('AFTER','#4cd964')">AFTER</button>
</div>

<div class="color-bar">
<div class="c-btn" style="background:#fff" onclick="applyColor('#ffffff')"></div>
<div class="c-btn" style="background:#ff3b30" onclick="applyColor('#ff3b30')"></div>
<div class="c-btn" style="background:#4cd964" onclick="applyColor('#4cd964')"></div>
<div class="c-btn" style="background:#ffcc00" onclick="applyColor('#ffcc00')"></div>
<div class="c-btn" style="background:#007bff" onclick="applyColor('#007bff')"></div>
<div class="c-btn" style="background:#000;border:1px solid #fff" onclick="applyColor('#000000')"></div>
</div>

</div>

<div class="editor-view">
<div id="collage-grid" class="grid-1"></div>

<div class="size-control" id="sizeCtrl">
<input type="range" id="sizeRange" min="10" max="200" value="35">
<span style="font-size:11px;color:#888;margin-top:5px;">ADJUST SIZE</span>
</div>
</div>
</div>

<div id="textModal">
<div class="modal-box">
<input type="text" id="txtInput" placeholder="Enter text here...">
<div class="row">
<button class="btn-green" style="flex:1;padding:15px" onclick="createText()">ADD</button>
<button class="btn-red" style="flex:1;padding:15px" onclick="hideModal()">CANCEL</button>
</div>
</div>
</div>

<input type="file" id="fileInput" hidden accept="image/*">

<script>
const grid = document.getElementById('collage-grid');
const fileInput = document.getElementById('fileInput');
const sizeCtrl = document.getElementById('sizeCtrl');
const trashCan = document.getElementById('trash-can');

let selectedText = null;
let currentOrientation = 'vertical';
let historyStack = [];
let redoStack = [];

function saveState(){
    historyStack.push(grid.innerHTML);

    if(historyStack.length > 40){
        historyStack.shift();
    }

    redoStack = [];
}

function restoreState(state){
    grid.innerHTML = state;

    document.querySelectorAll('.slot').forEach(slot=>{
        initSlotInteraction(slot);
    });

    document.querySelectorAll('.floating-text').forEach(t=>{
        makeDraggable(t);
    });
}

function undoAction(){
    if(historyStack.length < 2) return;

    const current = historyStack.pop();
    redoStack.push(current);

    const prev = historyStack[historyStack.length - 1];
    restoreState(prev);
}

function redoAction(){
    if(redoStack.length === 0) return;

    const next = redoStack.pop();
    historyStack.push(next);

    restoreState(next);
}

function initSlotInteraction(slot){

    let scale = 1;
    let lastScale = 1;
    let posX = 0;
    let posY = 0;
    let lastPosX = 0;
    let lastPosY = 0;
    let startDist = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    slot.addEventListener('touchstart',(e)=>{

        if(e.target.classList.contains('floating-text')) return;

        const img = slot.querySelector('img');

        if(!img){
            fileInput.onchange = (ev)=>{

                const r = new FileReader();

                r.onload = (f)=>{
                    slot.innerHTML = `
                    <img src="${f.target.result}" style="transform:translate(0px,0px) scale(1)">
                    `;

                    initSlotInteraction(slot);
                    saveState();
                };

                r.readAsDataURL(ev.target.files[0]);
                fileInput.value = '';
            };

            fileInput.click();
            return;
        }

        if(e.touches.length === 2){
            startDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }else{
            isDragging = true;
            startX = e.touches[0].pageX - lastPosX;
            startY = e.touches[0].pageY - lastPosY;
        }
    });

    slot.addEventListener('touchmove',(e)=>{

        if(e.target.classList.contains('floating-text')) return;

        const img = slot.querySelector('img');
        if(!img) return;

        if(e.touches.length === 2){

            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );

            scale = lastScale * (dist / startDist);
            scale = Math.max(0.5, Math.min(scale, 5));

        }else if(isDragging){

            posX = e.touches[0].pageX - startX;
            posY = e.touches[0].pageY - startY;
        }

        img.style.transform = `translate(${posX}px,${posY}px) scale(${scale})`;
    });

    slot.addEventListener('touchend',()=>{
        isDragging = false;
        lastScale = scale;
        lastPosX = posX;
        lastPosY = posY;

        saveState();
    });
}

function toggleOrientation(){

    currentOrientation = currentOrientation === 'vertical'
        ? 'horizontal'
        : 'vertical';

    const currentGrid = grid.className;

    updateLayout(currentGrid);
}

function updateLayout(type){

    const currentTexts = Array.from(document.querySelectorAll('.floating-text'));

    grid.innerHTML = '';
    grid.className = type;

    if(currentOrientation === 'horizontal'){

        if(type === 'grid-2'){
            grid.style.gridTemplateColumns = '1fr';
            grid.style.gridTemplateRows = '1fr 1fr';
        }

        if(type === 'grid-4'){
            grid.style.gridTemplateColumns = '1fr';
            grid.style.gridTemplateRows = '1fr 1fr 1fr 1fr';
        }

        if(type === 'grid-3'){
            grid.style.gridTemplateAreas = `
            "t"
            "bl"
            "br"
            `;

            grid.style.gridTemplateColumns = '1fr';
            grid.style.gridTemplateRows = '1fr 1fr 1fr';
        }

    }else{

        grid.style.gridTemplateColumns = '';
        grid.style.gridTemplateRows = '';
        grid.style.gridTemplateAreas = '';
    }

    const count = {
        'grid-1':1,
        'grid-2':2,
        'grid-3':3,
        'grid-4':4
    }[type];

    for(let i=0;i<count;i++){

        const s = document.createElement('div');
        s.className = 'slot';

        if(type === 'grid-3'){
            s.style.gridArea = ['t','bl','br'][i];
        }

        grid.appendChild(s);
        initSlotInteraction(s);
    }

    currentTexts.forEach(t=>grid.appendChild(t));

    saveState();
}

function addFloatingText(val,color){

    const el = document.createElement('div');

    el.className = 'floating-text';
    el.innerText = val;
    el.style.color = color;
    el.style.transform = 'translate(20px,20px)';

    grid.appendChild(el);

    makeDraggable(el);

    saveState();
}

function makeDraggable(el){

    function getTranslate(element){

        const style = window.getComputedStyle(element);
        const matrix = new WebKitCSSMatrix(style.transform);

        return {
            x:matrix.m41,
            y:matrix.m42
        };
    }

    el.addEventListener('touchstart',(e)=>{

        e.stopPropagation();

        document.querySelectorAll('.floating-text').forEach(t=>{
            t.classList.remove('active');
        });

        el.classList.add('active');
        selectedText = el;

        sizeCtrl.style.display = 'flex';

        document.getElementById('sizeRange').value = parseInt(
            window.getComputedStyle(el).fontSize
        );

        trashCan.style.display = 'flex';

        const initial = getTranslate(el);

        el.startX = e.touches[0].pageX - initial.x;
        el.startY = e.touches[0].pageY - initial.y;
    });

    el.addEventListener('touchmove',(e)=>{

        const x = e.touches[0].pageX - el.startX;
        const y = e.touches[0].pageY - el.startY;

        el.style.transform = `translate(${x}px,${y}px)`;

        const tRect = el.getBoundingClientRect();
        const bRect = trashCan.getBoundingClientRect();

        const overlap = !(
            tRect.right < bRect.left ||
            tRect.left > bRect.right ||
            tRect.bottom < bRect.top ||
            tRect.top > bRect.bottom
        );

        trashCan.classList.toggle('hover', overlap);
    });

    el.addEventListener('touchend',()=>{

        trashCan.style.display = 'none';

        if(trashCan.classList.contains('hover')){
            el.remove();
            selectedText = null;
            sizeCtrl.style.display = 'none';
        }

        trashCan.classList.remove('hover');

        saveState();
    });
}

function applyColor(color){

    if(selectedText){
        selectedText.style.color = color;
        saveState();
    }
}

document.getElementById('sizeRange').oninput = (e)=>{

    if(selectedText){
        selectedText.style.fontSize = e.target.value + 'px';
        saveState();
    }
};

function showModal(){
    document.getElementById('textModal').style.display = 'flex';
    document.getElementById('txtInput').focus();
}

function hideModal(){
    document.getElementById('textModal').style.display = 'none';
}

function createText(){

    const val = document.getElementById('txtInput').value;

    if(val){
        addFloatingText(val,'#ffffff');
    }

    document.getElementById('txtInput').value = '';

    hideModal();
}

function saveImage(){

    document.querySelectorAll('.floating-text').forEach(t=>{
        t.classList.remove('active');
    });

    html2canvas(grid,{
        scale:window.devicePixelRatio * 2,
        useCORS:true,
        backgroundColor:'#000'
    }).then(canvas=>{

        const a = document.createElement('a');

        a.download = `PhotoPro_${Date.now()}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
    });
}

window.onload = ()=>{
    updateLayout('grid-1');
    saveState();
};

</script>
</body>
</html>
