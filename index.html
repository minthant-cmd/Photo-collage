<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Editor Pro</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Editor Pro">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        .main-container { display: flex; flex-direction: column; height: 100%; width: 100%; }

        /* Fixed Header */
        .header { padding: 10px 5px; background: #1a1a1a; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        
        button { padding: 12px 14px; background: #333; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        .btn-blue { background: #007bff !important; } 
        .btn-green { background: #28a745 !important; } 
        .btn-red { background: #d9534f !important; }
        .btn-success { background: #5cb85c !important; }

        /* Color Selection Bar */
        .color-bar { display: flex; justify-content: center; gap: 12px; padding: 8px; background: #222; border-radius: 30px; margin: 5px 15px; border: 1px solid #333; }
        .c-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #555; }

        /* Main Viewport */
        .editor-view { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; padding: 10px; position: relative; }
        
        /* The Canvas Grid */
        #collage-grid { 
            width: 95vw; height: 95vw; max-width: 450px; max-height: 450px; 
            background: #111; display: grid; gap: 4px; border: 4px solid #fff; 
            position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        
        .slot { background-color: #222; background-size: cover; background-position: center; position: relative; }

        /* Text Styling */
        .floating-text {
            position: absolute; left: 0; top: 0; padding: 10px;
            font-size: 35px; font-weight: 900; color: white;
            text-shadow: 0px 0px 10px rgba(0,0,0,1), 2px 2px 5px rgba(0,0,0,1);
            white-space: nowrap; z-index: 100;
        }
        .floating-text.active { border: 2px dashed #007bff; background: rgba(0,123,255,0.15); border-radius: 4px; }

        /* Size Adjustment Control */
        .size-control { width: 100%; max-width: 380px; height: 70px; display: none; flex-direction: column; align-items: center; justify-content: center; margin-top: 10px; }
        .size-control input { width: 80%; height: 35px; accent-color: #007bff; }

        /* Layout Grid System */
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-areas: "t t" "bl br"; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        /* Custom Modal */
        #textModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #222; padding: 30px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #444; }
        .modal-box input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #000; color: white; border: 1px solid #555; font-size: 18px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div class="row">
            <button class="btn-blue" onclick="showModal()">ADD TEXT</button>
            <button class="btn-green" onclick="saveImage()">DOWNLOAD</button>
            <button onclick="undo()">UNDO</button>
            <button onclick="redo()">REDO</button>
        </div>
        <div class="row">
            <button onclick="updateLayout('grid-1')">1P</button>
            <button onclick="updateLayout('grid-2')">2P</button>
            <button onclick="updateLayout('grid-3')">3P</button>
            <button onclick="updateLayout('grid-4')">4P</button>
            <button class="btn-red" onclick="addFloatingText('BEFORE', '#ff3b30')">BEFORE</button>
            <button class="btn-success" onclick="addFloatingText('AFTER', '#4cd964')">AFTER</button>
        </div>
        <div class="color-bar">
            <div class="c-btn" style="background:#ffffff" onclick="applyColor('#ffffff')"></div>
            <div class="c-btn" style="background:#ff3b30" onclick="applyColor('#ff3b30')"></div>
            <div class="c-btn" style="background:#4cd964" onclick="applyColor('#4cd964')"></div>
            <div class="c-btn" style="background:#ffcc00" onclick="applyColor('#ffcc00')"></div>
            <div class="c-btn" style="background:#007bff" onclick="applyColor('#007bff')"></div>
            <div class="c-btn" style="background:#000000; border: 1px solid #fff;" onclick="applyColor('#000000')"></div>
        </div>
    </div>
    
    <div class="editor-view">
        <div id="collage-grid" class="grid-1"></div>
        
        <div class="size-control" id="sizeCtrl">
            <input type="range" id="sizeRange" min="10" max="250" value="40">
            <span style="font-size: 11px; color: #888; margin-top: 5px;">TEXT SIZE ADJUST</span>
        </div>
    </div>
</div>

<div id="textModal">
    <div class="modal-box">
        <input type="text" id="txtInput" placeholder="Enter text here...">
        <div class="row" style="gap: 12px;">
            <button class="btn-green" style="flex:1; padding: 15px;" onclick="createText()">ADD</button>
            <button class="btn-red" style="flex:1; padding: 15px;" onclick="hideModal()">CANCEL</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" hidden accept="image/*">

<script>
    const grid = document.getElementById('collage-grid');
    const modal = document.getElementById('textModal');
    const sizeCtrl = document.getElementById('sizeCtrl');
    const sizeRange = document.getElementById('sizeRange');
    const txtInput = document.getElementById('txtInput');
    const fileInput = document.getElementById('fileInput');

    let history = [], step = -1;
    let selectedEl = null;

    // Undo/Redo Engine
    function save() {
        step++;
        history = history.slice(0, step);
        history.push(grid.innerHTML);
    }

    function undo() {
        if (step > 0) { step--; grid.innerHTML = history[step]; reAttachAll(); }
    }

    function redo() {
        if (step < history.length - 1) { step++; grid.innerHTML = history[step]; reAttachAll(); }
    }

    // Modal UI
    function showModal() { modal.style.display = 'flex'; txtInput.value=''; txtInput.focus(); }
    function hideModal() { modal.style.display = 'none'; }
    function createText() {
        const val = txtInput.value.trim();
        if (val) addFloatingText(val, '#ffffff');
        hideModal();
    }

    // Floating Text Logic
    function addFloatingText(val, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = val;
        el.style.color = color;
        el.dataset.x = 50; el.dataset.y = 50; el.dataset.size = 40;
        el.style.transform = `translate(50px, 50px)`;
        grid.appendChild(el);
        makeDraggable(el);
        save();
    }

    function makeDraggable(el) {
        let startX, startY, initialX, initialY;
        
        el.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            document.querySelectorAll('.floating-text').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            selectedEl = el;
            sizeCtrl.style.display = 'flex';
            sizeRange.value = el.dataset.size;
            
            if (e.touches.length === 1) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                initialX = parseFloat(el.dataset.x);
                initialY = parseFloat(el.dataset.y);
            }
        });

        el.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && selectedEl === el) {
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                const nx = initialX + dx;
                const ny = initialY + dy;
                el.style.transform = `translate(${nx}px, ${ny}px)`;
                el.dataset.x = nx; el.dataset.y = ny;
            }
        });

        el.addEventListener('touchend', (e) => {
            if (e.timeStamp - (el.lastTap || 0) < 300) {
                el.remove(); sizeCtrl.style.display = 'none'; selectedEl = null;
            }
            el.lastTap = e.timeStamp;
            save();
        });
    }

    // Controls
    sizeRange.addEventListener('input', () => {
        if (selectedEl) {
            selectedEl.style.fontSize = `${sizeRange.value}px`;
            selectedEl.dataset.size = sizeRange.value;
        }
    });
    sizeRange.addEventListener('change', save);

    function applyColor(color) {
        if (selectedEl) { selectedEl.style.color = color; save(); }
    }

    // Grid System
    function updateLayout(type) {
        const imgs = Array.from(document.querySelectorAll('.slot')).map(s => s.style.backgroundImage);
        grid.className = type;
        grid.innerHTML = '';
        const count = (type === 'grid-4') ? 4 : (type === 'grid-3' ? 3 : (type === 'grid-2' ? 2 : 1));
        
        for (let i = 0; i < count; i++) {
            const s = document.createElement('div');
            s.className = 'slot';
            if (imgs[i]) s.style.backgroundImage = imgs[i];
            s.onclick = () => {
                fileInput.onchange = (e) => {
                    const r = new FileReader();
                    r.onload = (ev) => { s.style.backgroundImage = `url(${ev.target.result})`; save(); };
                    r.readAsDataURL(e.target.files[0]);
                };
                fileInput.click();
            };
            if (type === 'grid-3') {
                if (i === 0) s.style.gridArea = "t";
                if (i === 1) s.style.gridArea = "bl";
                if (i === 2) s.style.gridArea = "br";
            }
            grid.appendChild(s);
        }
        save();
    }

    function reAttachAll() {
        document.querySelectorAll('.floating-text').forEach(makeDraggable);
        document.querySelectorAll('.slot').forEach(s => {
            s.onclick = () => {
                fileInput.onchange = (e) => {
                    const r = new FileReader();
                    r.onload = (ev) => { s.style.backgroundImage = `url(${ev.target.result})`; save(); };
                    r.readAsDataURL(e.target.files[0]);
                };
                fileInput.click();
            };
        });
    }

    // High Quality Export
    function saveImage() {
        document.querySelectorAll('.floating-text').forEach(t => t.classList.remove('active'));
        sizeCtrl.style.display = 'none';
        
        html2canvas(grid, { 
            useCORS: true, 
            scale: 5, // 5x Resolution for 4K quality
            backgroundColor: "#000000"
        }).then(canvas => {
            const a = document.createElement('a');
            a.download = `PhotoEditor_${Date.now()}.png`;
            a.href = canvas.toDataURL("image/png", 1.0);
            a.click();
        });
    }

    window.onload = () => updateLayout('grid-1');
</script>
</body>
</html>
