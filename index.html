<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Editor Pro - Full HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .main-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        /* Header */
        .header { padding: 10px 5px; background: #1a1a1a; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; }
        button { padding: 12px 14px; background: #333; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .btn-blue { background: #007bff !important; } 
        .btn-green { background: #28a745 !important; } 
        .btn-red { background: #d9534f !important; }
        .btn-success { background: #5cb85c !important; }

        /* Color Selection Bar */
        .color-bar { display: flex; justify-content: center; gap: 12px; padding: 8px; background: #222; border-radius: 30px; margin: 5px 15px; border: 1px solid #333; }
        .c-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #555; }

        /* Editor Area */
        .editor-view { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #080808; position: relative; padding: 10px; }
        #collage-grid { 
            width: 95vw; height: 95vw; max-width: 450px; max-height: 450px; 
            background: #fff; display: grid; gap: 4px; border: 4px solid #fff; 
            position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        
        .slot { background: #222; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .slot img { position: absolute; user-select: none; pointer-events: none; max-width: none; image-rendering: -webkit-optimize-contrast; }

        /* Text Layer */
        .floating-text {
            position: absolute; z-index: 100; padding: 10px; font-weight: 900; color: white;
            text-shadow: 2px 2px 10px #000; white-space: nowrap; font-size: 35px;
        }
        .floating-text.active { border: 2px dashed #007bff; background: rgba(0,123,255,0.1); }

        .size-control { width: 100%; max-width: 380px; height: 70px; display: none; flex-direction: column; align-items: center; justify-content: center; margin-top: 10px; }
        .size-control input { width: 80%; accent-color: #007bff; }

        /* Layout Grids */
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-areas: "t t" "bl br"; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        #textModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #222; padding: 30px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        .modal-box input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #000; color: white; border: 1px solid #555; font-size: 18px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div class="row">
            <button class="btn-blue" onclick="showModal()">ADD TEXT</button>
            <button class="btn-green" onclick="saveImage()">DOWNLOAD</button>
            <button onclick="location.reload()">CLEAR</button>
        </div>
        <div class="row">
            <button onclick="updateLayout('grid-1')">1P</button>
            <button onclick="updateLayout('grid-2')">2P</button>
            <button onclick="updateLayout('grid-3')">3P</button>
            <button onclick="updateLayout('grid-4')">4P</button>
            <button class="btn-red" onclick="addFloatingText('BEFORE', '#ff3b30')">BEFORE</button>
            <button class="btn-success" onclick="addFloatingText('AFTER', '#4cd964')">AFTER</button>
        </div>
        <div class="color-bar">
            <div class="c-btn" style="background:#ffffff" onclick="applyColor('#ffffff')"></div>
            <div class="c-btn" style="background:#ff3b30" onclick="applyColor('#ff3b30')"></div>
            <div class="c-btn" style="background:#4cd964" onclick="applyColor('#4cd964')"></div>
            <div class="c-btn" style="background:#ffcc00" onclick="applyColor('#ffcc00')"></div>
            <div class="c-btn" style="background:#007bff" onclick="applyColor('#007bff')"></div>
            <div class="c-btn" style="background:#000000; border: 1px solid #fff;" onclick="applyColor('#000000')"></div>
        </div>
    </div>

    <div class="editor-view">
        <div id="collage-grid" class="grid-1"></div>
        <div class="size-control" id="sizeCtrl">
            <input type="range" id="sizeRange" min="10" max="200" value="35">
            <span style="font-size: 11px; color: #888; margin-top: 5px;">TEXT SIZE</span>
        </div>
    </div>
</div>

<div id="textModal">
    <div class="modal-box">
        <input type="text" id="txtInput" placeholder="Enter text...">
        <div class="row">
            <button class="btn-green" style="flex:1" onclick="createText()">ADD</button>
            <button class="btn-red" style="flex:1" onclick="hideModal()">CANCEL</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" hidden accept="image/*">

<script>
    const grid = document.getElementById('collage-grid');
    const fileInput = document.getElementById('fileInput');
    const sizeCtrl = document.getElementById('sizeCtrl');
    let selectedText = null;

    // --- Image Interaction (Zoom/Pan) ---
    function initSlotInteraction(slot) {
        let scale = 1, lastScale = 1, posX = 0, posY = 0, lastPosX = 0, lastPosY = 0;
        let startDist = 0, isDragging = false, startX = 0, startY = 0;

        slot.addEventListener('touchstart', (e) => {
            const img = slot.querySelector('img');
            if (!img) {
                fileInput.onchange = (ev) => {
                    const r = new FileReader();
                    r.onload = (f) => {
                        const newImg = document.createElement('img');
                        newImg.src = f.target.result;
                        newImg.style.transform = `translate(0px, 0px) scale(1)`;
                        slot.innerHTML = ''; // Clear previous
                        slot.appendChild(newImg);
                    };
                    r.readAsDataURL(ev.target.files[0]);
                };
                fileInput.click();
                return;
            }

            if (e.touches.length === 2) {
                startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            } else {
                isDragging = true;
                startX = e.touches[0].pageX - lastPosX;
                startY = e.touches[0].pageY - lastPosY;
            }
        });

        slot.addEventListener('touchmove', (e) => {
            const img = slot.querySelector('img');
            if (!img) return;
            if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                scale = lastScale * (dist / startDist);
            } else if (isDragging) {
                posX = e.touches[0].pageX - startX;
                posY = e.touches[0].pageY - startY;
            }
            img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        });

        slot.addEventListener('touchend', () => {
            isDragging = false; lastScale = scale; lastPosX = posX; lastPosY = posY;
        });
    }

    // --- Layouts ---
    function updateLayout(type) {
        const currentTexts = Array.from(document.querySelectorAll('.floating-text'));
        grid.innerHTML = '';
        grid.className = type;
        const count = { 'grid-1':1, 'grid-2':2, 'grid-3':3, 'grid-4':4 }[type];
        for (let i=0; i<count; i++) {
            const s = document.createElement('div');
            s.className = 'slot';
            if (type === 'grid-3') s.style.gridArea = ["t", "bl", "br"][i];
            grid.appendChild(s);
            initSlotInteraction(s);
        }
        currentTexts.forEach(t => grid.appendChild(t));
    }

    // --- Text Logic ---
    function addFloatingText(val, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = val;
        el.style.color = color;
        el.dataset.x = 50; el.dataset.y = 50;
        el.style.transform = `translate(0px, 0px)`;
        grid.appendChild(el);
        makeDraggable(el);
    }

    function makeDraggable(el) {
        let tx = 0, ty = 0, startX = 0, startY = 0;
        el.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            document.querySelectorAll('.floating-text').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            selectedText = el;
            sizeCtrl.style.display = 'flex';
            document.getElementById('sizeRange').value = parseInt(window.getComputedStyle(el).fontSize);
            startX = e.touches[0].pageX - tx;
            startY = e.touches[0].pageY - ty;
        });
        el.addEventListener('touchmove', (e) => {
            tx = e.touches[0].pageX - startX;
            ty = e.touches[0].pageY - startY;
            el.style.transform = `translate(${tx}px, ${ty}px)`;
        });
        el.addEventListener('touchend', (e) => {
            if (e.timeStamp - (el.lastTap || 0) < 300) { el.remove(); sizeCtrl.style.display='none'; }
            el.lastTap = e.timeStamp;
        });
    }

    function applyColor(color) { if(selectedText) selectedText.style.color = color; }
    document.getElementById('sizeRange').oninput = (e) => { if(selectedText) selectedText.style.fontSize = e.target.value + "px"; };

    function showModal() { document.getElementById('textModal').style.display='flex'; }
    function hideModal() { document.getElementById('textModal').style.display='none'; }
    function createText() {
        const val = document.getElementById('txtInput').value;
        if(val) addFloatingText(val, '#ffffff');
        hideModal();
    }

    function saveImage() {
        document.querySelectorAll('.floating-text').forEach(t => t.classList.remove('active'));
        sizeCtrl.style.display = 'none';
        html2canvas(grid, { scale: 3, useCORS: true, backgroundColor: "#000" }).then(canvas => {
            const a = document.createElement('a');
            a.download = `PhotoPro_${Date.now()}.png`;
            a.href = canvas.toDataURL();
            a.click();
        });
    }

    window.onload = () => updateLayout('grid-1');
</script>
</body>
</html>
