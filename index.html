<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photo Editor Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:none;user-select:none;}
body{background:#000;color:#fff;font-family:-apple-system,sans-serif;overflow:hidden;height:100vh;}

.main{display:flex;flex-direction:column;height:100%;}

.header{background:#181818;padding:10px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid #333;}
.row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
button{padding:12px 14px;border:none;border-radius:8px;background:#333;color:#fff;font-size:11px;font-weight:bold;}

.btn-blue{background:#007bff;}
.btn-green{background:#28a745;}
.btn-red{background:#d9534f;}
.btn-yellow{background:#ff9500;}

.editor{flex:1;display:flex;justify-content:center;align-items:center;background:#111;position:relative;}

#grid{
width:95vw;height:95vw;max-width:450px;max-height:450px;
background:#fff;display:grid;gap:4px;border:4px solid #fff;position:relative;overflow:hidden;
}

.grid-1{grid-template-columns:1fr;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.grid-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}

.slot{background:#222;position:relative;overflow:hidden;}

.slot img{
position:absolute;width:100%;height:100%;object-fit:cover;
}

.text{
position:absolute;left:0;top:0;padding:10px;font-size:30px;font-weight:bold;color:#fff;
text-shadow:2px 2px 8px #000;cursor:move;
}

#file{display:none;}

#sizeBar{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:80%;
max-width:300px;
display:none;
z-index:999;
}

#sizeRange{
width:100%;
}

.colorBar{
display:flex;
justify-content:center;
gap:12px;
padding:8px;
background:#222;
border-radius:30px;
margin:5px 15px;
border:1px solid #333;
}

.colorBtn{
width:28px;
height:28px;
border-radius:50%;
border:2px solid #555;
}

#textModal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modalBox{
background:#222;
padding:20px;
border-radius:14px;
width:85%;
max-width:320px;
}

.modalBox input{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin-bottom:12px;
outline:none;
}
</style>
</head>
<body>

<div class="main">

<div class="header">

<div class="row">
<button class="btn-blue" onclick="addText()">ADD TEXT</button>
<button class="btn-green" onclick="download()">DOWNLOAD HD</button>
<button class="btn-yellow" onclick="undo()">UNDO</button>
<button class="btn-red" onclick="redo()">REDO</button>
<button onclick="clearAll()">CLEAR</button>
</div>

<div class="row">
<button onclick="setLayout('grid-1')">1P</button>
<button onclick="setLayout('grid-2')">2P</button>
<button onclick="setLayout('grid-3')">3P</button>
<button onclick="setLayout('grid-4')">4P</button>
</div>

<div class="row">
<button class="btn-red" onclick="addLabel('BEFORE','#ff3b30')">BEFORE</button>
<button class="btn-green" onclick="addLabel('AFTER','#4cd964')">AFTER</button>
</div>

<div class="colorBar">
<div class="colorBtn" style="background:#ffffff" onclick="setColor('#ffffff')"></div>
<div class="colorBtn" style="background:#ff3b30" onclick="setColor('#ff3b30')"></div>
<div class="colorBtn" style="background:#4cd964" onclick="setColor('#4cd964')"></div>
<div class="colorBtn" style="background:#ffcc00" onclick="setColor('#ffcc00')"></div>
<div class="colorBtn" style="background:#007bff" onclick="setColor('#007bff')"></div>
<div class="colorBtn" style="background:#000000;border:1px solid #fff" onclick="setColor('#000000')"></div>
</div>

</div>

<div class="editor">
<div id="grid" class="grid-1"></div>
</div>

<input type="file" id="file" accept="image/*">

<div id="textModal">
<div class="modalBox">
<input type="text" id="textInput" placeholder="Enter text...">
<div class="row">
<button class="btn-green" onclick="createText()">ADD</button>
<button class="btn-red" onclick="closeModal()">CANCEL</button>
</div>
</div>
</div>

<div id="sizeBar">
<input type="range" id="sizeRange" min="10" max="100" value="30">
</div>

</div>

<script>
const grid=document.getElementById('grid');
const file=document.getElementById('file');

let history=[];
let selectedText=null;
let redoStack=[];

function save(){
history.push(grid.innerHTML);
redoStack=[];
}

function restore(h){
grid.innerHTML=h;
init();
}

function undo(){
if(history.length>1){
redoStack.push(history.pop());
restore(history[history.length-1]);
}
}

function redo(){
if(redoStack.length){
const h=redoStack.pop();
history.push(h);
restore(h);
}
}

function clearAll(){
grid.innerHTML='';
history=[];
redoStack=[];
setLayout('grid-1');
}

function setLayout(t){
grid.className=t;
createSlots(t);
save();
}

function createSlots(t){
grid.innerHTML='';
let c=1;
if(t==='grid-2')c=2;
if(t==='grid-3')c=3;
if(t==='grid-4')c=4;

for(let i=0;i<c;i++){
const s=document.createElement('div');
s.className='slot';

s.onclick=()=>{
file.click();
file.onchange=(e)=>{
const r=new FileReader();
r.onload=(ev)=>{
s.innerHTML=`<img src="${ev.target.result}">`;
save();
};
r.readAsDataURL(e.target.files[0]);
}
}

grid.appendChild(s);
}
}

function addText(){
document.getElementById('textModal').style.display='flex';
document.getElementById('textInput').focus();
}

function closeModal(){
document.getElementById('textModal').style.display='none';
}

function createText(){
const t=document.getElementById('textInput').value;
if(!t)return;

const d=document.createElement('div');
d.className='text';
d.innerText=t;
d.style.left='20px';
d.style.top='20px';

d.ontouchstart=(e)=>{
selectedText=d;
document.getElementById('sizeBar').style.display='block';
document.getElementById('sizeRange').value=parseInt(window.getComputedStyle(d).fontSize);

let x=e.touches[0].pageX-d.offsetLeft;
let y=e.touches[0].pageY-d.offsetTop;

d.ontouchmove=(e)=>{
d.style.left=(e.touches[0].pageX-x)+'px';
d.style.top=(e.touches[0].pageY-y)+'px';
};
};

grid.appendChild(d);
save();

document.getElementById('textInput').value='';
closeModal();
}

function addLabel(txt,color){
const d=document.createElement('div');
d.className='text';
d.innerText=txt;
d.style.color=color;
d.style.left='30px';
d.style.top='30px';

d.ontouchstart=(e)=>{
selectedText=d;
document.getElementById('sizeBar').style.display='block';
document.getElementById('sizeRange').value=parseInt(window.getComputedStyle(d).fontSize);

let x=e.touches[0].pageX-d.offsetLeft;
let y=e.touches[0].pageY-d.offsetTop;

d.ontouchmove=(e)=>{
d.style.left=(e.touches[0].pageX-x)+'px';
d.style.top=(e.touches[0].pageY-y)+'px';
};
};

grid.appendChild(d);
save();
}

function download(){
html2canvas(grid,{scale:2}).then(c=>{
const a=document.createElement('a');
a.download='photo.png';
a.href=c.toDataURL();
a.click();
});
}

document.getElementById('sizeRange').oninput=(e)=>{
if(selectedText){
selectedText.style.fontSize=e.target.value+'px';
save();
}
};

function setColor(c){
if(selectedText){
selectedText.style.color=c;
save();
}
}

function init(){}

setLayout('grid-1');
save();
</script>

</body>
</html>
```
